packages:
  - packages/*
  - apps/*

catalog:
  "@babel/parser": ^7.29.7
  "@babel/traverse": ^7.29.7
  "@babel/types": ^7.29.7
  "@commitlint/cli": ^21.1.0
  "@commitlint/config-conventional": ^21.1.0
  "@commitlint/types": ^21.1.0
  "@playwright/test": ^1.61.1
  "@scalar/api-reference-react": ^0.9.48
  "@seriousme/openapi-schema-validator": ^2.9.0
  "@tailwindcss/postcss": ^4.3.1
  "@types/babel__traverse": ^7.28.0
  "@types/fs-extra": ^11.0.4
  "@types/node": ^26.0.1
  "@types/swagger-ui-react": ^5.18.0
  "@vitest/coverage-v8": ^4.1.9
  ajv: ^8.20.0
  autoprefixer: ^10.5.2
  babel-plugin-react-compiler: ^1.0.0
  commander: ^15.0.0
  cross-env: ^10.1.0
  conventional-changelog-cli: ^5.0.0
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  drizzle-zod: ^0.8.3
  eslint-plugin-turbo: ^2.10.0
  fs-extra: ^11.3.5
  js-yaml: ^5.1.0
  knip: ^6.20.0
  lint-staged: ^17.0.8
  np: ^11.2.1
  ora: ^9.4.1
  oxfmt: ^0.56.0
  oxlint: ^1.71.0
  oxlint-tsgolint: ^0.23.0
  postcss: ^8.5.15
  postgres: ^3.4.9
  simple-git-hooks: ^2.13.1
  swagger-ui-react: ^5.32.8
  tailwindcss: ^4.3.1
  tsup: ^8.5.1
  turbo: ^2.10.0
  typescript: 5.9.3
  vitest: ^4.1.9
  zod: ^4.4.3

catalogMode: strict

catalogs:
  nextjs:
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    next: 16.2.9
    react: 19.2.7
    react-dom: 19.2.7
  react-router:
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    "@vitejs/plugin-react": ^6.0.3
    react: 19.2.7
    react-dom: 19.2.7
    react-router: ^8.0.1
    vite: ^8.1.0
  tanstack:
    "@tanstack/react-router": ^1.170.16
    "@tanstack/react-start": ^1.168.26
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    "@vitejs/plugin-react": ^6.0.3
    react: 19.2.7
    react-dom: 19.2.7
    vite: ^8.1.0
  zod3:
    zod: ^3.25.76

pmOnFail: download

saveWorkspaceProtocol: rolling

trustLockfile: true

# swagger-ui-react still declares React 18 peers on some transitive deps; React 19 is compatible.
peerDependencyRules:
  allowedVersions:
    react: "19"

strictPeerDependencies: true

packageExtensions:
  "knip@*":
    dependencies:
      "@types/minimist": "*"

allowBuilds:
  "@scarf/scarf": false
  "@tree-sitter-grammars/tree-sitter-yaml": true
  core-js-pure: false
  esbuild: true
  sharp: true
  simple-git-hooks: true
  tree-sitter: true
  tree-sitter-json: true
  vue-demi: true

overrides:
  esbuild: ">=0.28.1"
  postcss: ">=8.5.10"
  tmp: ">=0.2.6"

minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - postcss@8.5.15
  - tmp@0.2.7
